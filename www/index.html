<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>わせわせ</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f5f5f5;
      color: #891E2B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    p {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.6;
    }
    a {
      color: #891E2B;
      font-weight: 700;
    }
    .badge {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #e0c4c8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>わせわせ</h1>
  <p>Capacitor のローカル Web アセットが読み込まれています。</p>
  <p>この画面が表示されれば、黒画面の原因はリモート URL 側の可能性が高いです。</p>
  <p class="badge" id="platform">読み込み中…</p>
  <p style="margin-top: 20px;">
    <a href="https://wasewase.onrender.com/">本番サイトをブラウザで開く</a>
  </p>
  <script src="js/admob_config.js"></script>
  <script src="js/capacitor_native.js" defer></script>
  <script>
    (function () {
      var el = document.getElementById("platform");
      var isNative =
        window.Capacitor &&
        typeof window.Capacitor.isNativePlatform === "function" &&
        window.Capacitor.isNativePlatform();
      if (isNative) {
        el.textContent = "ネイティブアプリ（Capacitor）で起動中";
      } else {
        el.textContent = "Web ブラウザで表示中";
      }
    })();
  </script>
</body>
</html>
