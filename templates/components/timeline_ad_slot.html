  <!-- 広告コードはここに貼り付け -->
  {#

  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-xxxxxxxx"
       data-ad-slot="xxxxxxxx"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>

  #}
  <p class="timeline-ad-slot__placeholder">【スポンサーリンク】（ここに将来広告コードが入ります）</p>
</aside>
