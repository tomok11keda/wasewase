<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>わせわせ — ログイン</title>
  <style>
    :root { --bg: #f5f5f5; --card: #fff; --text: #222; --accent: #891E2B; --accent-dark: #6f1722; --radius: 12px; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .main-inner { max-width: 400px; margin: 40px auto; padding: 16px; }
    .form-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    h1 { margin: 0 0 20px; font-size: 20px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: var(--accent-dark); }
    .errors { color: var(--accent); font-size: 13px; margin-bottom: 12px; }
    .footer-link { display: block; margin-top: 16px; text-align: center; font-size: 14px; color: #666; }
    .footer-link a { color: var(--accent); }
  </style>
</head>
<body>
  <main class="main-inner">
    <div class="form-card">
      <h1>ログイン</h1>
      {% if form.errors %}
      <p class="errors">ユーザー名またはパスワードが正しくありません。</p>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label for="id_username">ユーザー名</label>
        <input type="text" name="username" id="id_username" required autofocus>
        <label for="id_password">パスワード</label>
        <input type="password" name="password" id="id_password" required>
        <button type="submit" class="btn">ログイン</button>
      </form>
      <p class="footer-link">アカウントをお持ちでない方は <a href="{% url 'signup' %}">新規登録</a></p>
      <p class="footer-link"><a href="{% url 'home' %}">トップへ戻る</a></p>
    </div>
  </main>
</body>
</html>
