<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>わせわせ — プロフィール編集</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #fff;
      --text: #222;
      --muted: #888;
      --accent: #891E2B;
      --accent-dark: #6f1722;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 24px;
    }
    .site-header {
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #fff;
      text-decoration: none;
    }
    .main-inner {
      max-width: 560px;
      margin: 0 auto;
      padding: 12px;
    }
    .form-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      font-size: 15px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
    }
    .field-error {
      color: #c00;
      font-size: 12px;
      margin: 4px 0 0;
    }
    .btn-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .messages { list-style: none; padding: 0; margin: 0 0 12px; }
    .messages li {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .messages .success { background: #e8f5e9; color: #2e7d32; }
    .messages .error { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="{% url 'user_profile' request.user.pk %}?from=market">← プロフィールに戻る</a>
    <h1 style="margin:0;font-size:18px">プロフィール編集</h1>
  </header>

  <main class="main-inner">
    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    <form class="form-card" method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="field">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}
        <p class="field-error">{{ error }}</p>
        {% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn-primary">保存する</button>
    </form>
  </main>
</body>
</html>
