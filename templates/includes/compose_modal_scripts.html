<script>
(function () {
  var modal = document.getElementById("compose-modal");

  function openModal() {
    if (!modal) return;
    modal.hidden = false;
    modal.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    var field = modal.querySelector("textarea");
    if (field) field.focus();
  }

  function closeModal() {
    if (!modal) return;
    modal.hidden = true;
    modal.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  if (modal) {
    document.addEventListener("click", function (event) {
      var trigger = event.target.closest("[data-compose-open]");
      if (!trigger) return;
      event.preventDefault();
      openModal();
    });
    modal.querySelectorAll("[data-compose-modal-close]").forEach(function (el) {
      el.addEventListener("click", closeModal);
    });
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && modal && !modal.hidden) {
        closeModal();
      }
    });

    var params = new URLSearchParams(window.location.search);
    if (params.has("quote") || window.location.hash === "#compose") {
      openModal();
    }
  }
})();
</script>
