{% load static %}
<meta name="theme-color" content="#891E2B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="わせわせ">
<link rel="manifest" href="{% url 'pwa_manifest' %}">
<link rel="apple-touch-icon" href="{% static 'pwa/icon-192.png' %}">
<link rel="icon" type="image/png" sizes="192x192" href="{% static 'pwa/icon-192.png' %}">
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("{% url 'pwa_service_worker' %}", { scope: "/" }).catch(function () {});
    });
  }
</script>
