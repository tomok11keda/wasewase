<style>
  button.nav-item {
    border: none;
    background: transparent;
    font-family: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-soon-toast {
    position: fixed;
    left: 50%;
    bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    z-index: 400;
    margin: 0;
    padding: 12px 18px;
    border-radius: 999px;
    background: #0f1419;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.2);
    transform: translateX(-50%) translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .nav-soon-toast.is-visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .nav-soon-toast[hidden] {
    display: block;
    visibility: hidden;
  }
  .nav-soon-toast.is-visible[hidden] {
    visibility: visible;
  }
</style>
<nav class="bottom-nav" aria-label="メイン">
  <a class="nav-item{% if nav_active == 'home' %} is-active{% endif %}" href="{% url 'home' %}"{% if nav_active == 'home' %} aria-current="page"{% endif %}>
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg>
    <span>ホーム</span>
  </a>
  <a class="nav-item{% if nav_active == 'search' %} is-active{% endif %}" href="{% url 'search' %}"{% if nav_active == 'search' %} aria-current="page"{% endif %}>
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <span>検索</span>
  </a>
  <button
    type="button"
    class="nav-item"
    data-nav-soon
    aria-label="コミュニティ（近日公開予定）"
  >
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    <span>コミュニティ</span>
  </button>
  <a class="nav-item{% if nav_active == 'mypage' %} is-active{% endif %}" href="{% url 'mypage' %}"{% if nav_active == 'mypage' %} aria-current="page"{% endif %}>
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    <span>マイページ</span>
  </a>
</nav>
<p class="nav-soon-toast" id="nav-soon-toast" role="status" aria-live="polite" hidden>近日公開予定</p>
<script>
(function () {
  if (window.__waseNavSoonInit) return;
  window.__waseNavSoonInit = true;
  var soonToast = document.getElementById("nav-soon-toast");
  var soonTimer;
  if (!soonToast) return;
  document.addEventListener("click", function (event) {
    var button = event.target.closest("[data-nav-soon]");
    if (!button) return;
    event.preventDefault();
    window.clearTimeout(soonTimer);
    soonToast.hidden = false;
    soonToast.classList.add("is-visible");
    soonTimer = window.setTimeout(function () {
      soonToast.classList.remove("is-visible");
      soonToast.hidden = true;
    }, 2200);
  });
})();
</script>
